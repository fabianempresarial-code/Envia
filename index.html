<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envía Colvanes S.A.S. | Chapinero Calle 61</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --envia-red: #e31e24; --deep-dark: #020202; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--deep-dark); 
            color: #ffffff; 
            overflow-x: hidden; 
        }
        
        .glass-dark {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* --- ARREGLO DEFINITIVO PARA RECORTE Y ANIMACIÓN --- */
        .title-wrapper {
            padding: 20px 0; /* Espacio extra para evitar recortes */
            perspective: 1200px;
        }
        
        .animated-title {
            display: inline-block;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: left center;
        }

        .title-wrapper:hover .animated-title {
            transform: scale(1.03) rotateX(5deg) rotateY(-2deg);
            filter: drop-shadow(0 15px 30px rgba(227, 30, 36, 0.4));
        }

        .gradient-text {
            background: linear-gradient(135deg, #ffffff 30%, var(--envia-red) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            padding-right: 15px; /* Evita recorte en la última letra de la derecha */
        }

        /* Flotación suave de la imagen */
        .hero-img-box {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .reveal { opacity: 0; transform: translateY(30px); transition: all 1s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <nav class="fixed w-full z-[100] px-6 py-6">
        <div class="max-w-7xl mx-auto glass-dark rounded-[2rem] px-8 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="https://empleos.net/rhmanager/logos/original_size/71188_20210325113156.png" alt="Envía Logo" class="h-10">
                <span class="hidden md:block text-[10px] font-bold tracking-[0.4em] uppercase opacity-40 border-l border-white/10 pl-4">Colvanes S.A.S.</span>
            </div>
            <a href="https://wa.me/573143996019" target="_blank" class="bg-[#e31e24] hover:bg-white hover:text-black px-8 py-3 rounded-xl text-xs font-black uppercase tracking-widest transition-all duration-300">
                Cotizar WhatsApp
            </a>
        </div>
    </nav>

    <section class="relative min-h-screen flex items-center pt-20 px-6">
        <div class="max-w-7xl mx-auto grid lg:grid-cols-2 gap-10 items-center relative">
            
            <div class="reveal active title-wrapper">
                <h2 class="text-red-600 font-bold tracking-[0.6em] uppercase text-[10px] mb-4">Logística de Élite • Chapinero</h2>
                
                <div class="animated-title">
                    <h1 class="text-6xl md:text-8xl font-black leading-[1.1] italic tracking-tighter py-4">
                        PASIÓN <br>
                        <span class="gradient-text uppercase">POR LO QUE HACEMOS</span>
                    </h1>
                </div>

                <p class="text-zinc-500 text-xl mt-6 mb-12 font-light max-w-lg">
                    En <strong>Envía Colvanes S.A.S. Chapinero Calle 61</strong>, realizamos tus envíos de paquetes y mercancía con seguridad y rapidez.
                </p>

                <a href="https://wa.me/573143996019" target="_blank" class="inline-flex items-center gap-4 bg-white text-black px-12 py-5 rounded-2xl font-black hover:bg-red-600 hover:text-white transition-all duration-500 uppercase text-sm group">
                    <i class="fa-brands fa-whatsapp text-2xl group-hover:rotate-12 transition-transform"></i> 
                    Solicitar Recogida
                </a>
            </div>

            <div class="hero-img-box hidden lg:flex justify-end reveal active">
                <div class="glass-dark p-16 rounded-[4rem] border-white/10 shadow-2xl">
                    <img src="https://empleos.net/rhmanager/logos/original_size/71188_20210325113156.png" 
                         alt="Envía Corporativo" class="w-full max-w-[450px] object-contain">
                </div>
            </div>
        </div>
    </section>

    <footer class="py-12 text-center opacity-50">
        <p class="text-[10px] font-bold uppercase tracking-[0.5em]">Envía Colvanes S.A.S. • Calle 61 Bogotá</p>
    </footer>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
